# =============================================================================
# Elastic Resume Base – Root Environment Configuration
# =============================================================================
#
# This single file is the authoritative source of environment variables for
# ALL services in the project.  It replaces the individual .env.example files
# that previously lived under each service directory.
#
# Usage with Docker Compose (requires Docker Compose >= 2.24.0):
#   docker-compose up
#
# The docker-compose.yml already references this file via:
#   env_file:
#     - path: ./env.yaml
#       format: yaml
#
# Usage for local development WITHOUT Docker Compose:
#   Export each variable to your shell before starting the service, e.g.:
#     export FIREBASE_PROJECT_ID=demo-elastic-resume-base
#     cd bff-gateway && npm run dev
#
# Sensitive values (credentials, keys, webhook URLs) are intentionally left
# empty here.  Fill them in locally or provide them via a
# docker-compose.override.yml / CI-CD secrets — and NEVER commit real secrets
# to version control.
# =============================================================================

# =============================================================================
# Shared / Cross-Service
# =============================================================================

# Runtime mode shared by all Node.js services.
NODE_ENV: development

# Structured log level (trace | debug | info | warn | error | fatal).
LOG_LEVEL: info

# Google Cloud / Firebase project identifiers (shared by all services).
GCP_PROJECT_ID: demo-elastic-resume-base
FIREBASE_PROJECT_ID: demo-elastic-resume-base

# Firebase Local Emulator Suite addresses.
# These point at the 'firebase-emulator' container when using Docker Compose.
# For local dev without Docker, change these to localhost:<port>.
FIRESTORE_EMULATOR_HOST: "firebase-emulator:8080"
FIREBASE_AUTH_EMULATOR_HOST: "firebase-emulator:9099"
PUBSUB_EMULATOR_HOST: "firebase-emulator:8085"

# =============================================================================
# BFF Gateway
# =============================================================================

# Comma-separated list of allowed CORS origins.
ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"

# Comma-separated list of allowed email domains for user creation / update.
# Leave empty to allow all domains.
ALLOWED_EMAIL_DOMAINS: ""

# Timeout (milliseconds) applied to every downstream service call.
REQUEST_TIMEOUT_MS: "30000"

# Downstream microservice base URLs used by the BFF Gateway.
# Docker Compose service names are used here; adjust for other environments.
DOWNLOADER_SERVICE_URL: "http://downloader-service:8001"
SEARCH_BASE_SERVICE_URL: "http://search-base:8002"
FILE_GENERATOR_SERVICE_URL: "http://file-generator:8003"
DOCUMENT_READER_SERVICE_URL: "http://document-reader:8004"
USER_API_SERVICE_URL: "http://users-api:8005"

# =============================================================================
# Users API
# =============================================================================

# Google Service Account credentials (Base64-encoded JSON or raw JSON string).
# Required for Google Drive access via the Bugle shared library.
# Leave empty to fall back to Firestore-based role checks.
GOOGLE_SERVICE_ACCOUNT_KEY: ""

# Optional Google Drive File ID used to determine admin access.
# When set, GET /api/v1/users/:uid/role checks Drive permissions via Bugle.
# When unset, the endpoint falls back to the 'role' field in Firestore.
ADMIN_SHEET_FILE_ID: ""

# =============================================================================
# Python Microservices – Firestore Collection Names
# =============================================================================

FIRESTORE_RESUMES_COLLECTION: resumes
FIRESTORE_USERS_COLLECTION: users

# =============================================================================
# Cloud Pub/Sub – Topic Names
# =============================================================================

PUBSUB_INGESTOR_TOPIC: resume-ingested
PUBSUB_AI_WORKER_TOPIC: resume-extracted
PUBSUB_SEARCH_INDEX_TOPIC: resume-indexed
PUBSUB_DLQ_TOPIC: dead-letter-queue

# =============================================================================
# Vertex AI (AI Worker)
# =============================================================================

VERTEX_AI_LOCATION: us-central1
VERTEX_AI_EXTRACTION_MODEL: gemini-1.5-flash
VERTEX_AI_EMBEDDING_MODEL: text-multilingual-embedding-002

# =============================================================================
# Cloud KMS (PII Encryption)
# =============================================================================

KMS_KEY_RING: elastic-resume-keyring
KMS_KEY_NAME: resume-pii-key
KMS_KEY_LOCATION: global

# =============================================================================
# Search Base (FAISS)
# =============================================================================

# Path to the FAISS index file inside the Search Base container.
FAISS_INDEX_PATH: /app/data/resume.faiss

# =============================================================================
# Translation Cache (File Generator)
# =============================================================================

TRANSLATION_CACHE_COLLECTION: translation-cache

# =============================================================================
# DLQ Notifier
# =============================================================================

DLQ_NOTIFICATION_CHANNEL: slack
DLQ_SLACK_WEBHOOK_URL: ""
