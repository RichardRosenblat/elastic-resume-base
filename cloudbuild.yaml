# =============================================================================
# Cloud Build — Test, Build, Push and Deploy Pipeline
# =============================================================================
#
# Triggered by the deploy-prod GitHub Actions workflow on every push to the
# `prod` branch.
#
# Pipeline phases
# ───────────────
# 1. TEST   — unit tests for every service listed in
#             .github/deploy-config/deploy-services.json run in parallel.
#             If any test step exits non-zero, Cloud Build marks the entire
#             build as FAILED and the subsequent phases never execute.
#
# 2. GATE   — a lightweight barrier step that waits for all test steps.
#             Reaching this step means every test passed.
#
# 3. BUILD  — Docker images are built and pushed to the container registry
#             in parallel for each service (all wait for the gate step).
#
# 4. DEPLOY — each service is deployed to Cloud Run after its own image
#             has been pushed.
#
# Substitutions (passed by the GitHub Action; override via --substitutions)
# ──────────────────────────────────────────────────────────────────────────
#   _COMMIT_SHA     full Git commit SHA   (default: "latest")
#   _SHORT_SHA      first 7 chars of SHA  (default: "latest")
#   _REGION         Cloud Run region      (default: "us-central1")
#   _PROJECT_ID     GCP project ID        (required — passed by the GitHub Action)
#   _IMAGE_REGISTRY container registry    (default: "gcr.io")
#
# Required Cloud Build service-account roles
# ──────────────────────────────────────────
#   roles/run.admin
#   roles/iam.serviceAccountUser   (to act as each Cloud Run runtime SA)
#   roles/storage.admin            (to push images to GCR / AR)
#
# Service account model (least-privilege)
# ───────────────────────────────────────
# Every Cloud Run service runs under its own dedicated service account
# (svc-<service>@PROJECT.iam.gserviceaccount.com).  The gateway SA
# (svc-gateway) is granted roles/run.invoker on every private backend
# service so it is the only caller that can reach them.  Pub/Sub push
# subscriptions use the Pub/Sub service agent, which is independently
# granted roles/run.invoker on ai-worker, search-base, and dlq-notifier.
# See documentation/deployment plan.md §B2 for setup instructions.
# =============================================================================

substitutions:
  _COMMIT_SHA: latest
  _SHORT_SHA: latest
  _REGION: us-central1
  _IMAGE_REGISTRY: gcr.io
  _PROJECT_ID: ''

timeout: '2400s'

options:
  logging: CLOUD_LOGGING_ONLY

steps:

  # ===========================================================================
  # PHASE 1 — TESTS
  # All test steps start immediately (waitFor: ['-']) and run in parallel.
  # A failing step causes Cloud Build to abort the entire build, halting
  # deployment automatically.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # document-reader — Python
  # ---------------------------------------------------------------------------
  - name: 'python:3.11-slim'
    id: 'test-document-reader'
    waitFor: ['-']
    dir: 'apps/document-reader'
    entrypoint: sh
    args:
      - '-c'
      - |
        set -e
        echo "=== [document-reader] Installing test dependencies ==="
        pip install -q -r requirements/requirements-dev.txt
        echo "=== [document-reader] Running tests ==="
        python -m pytest tests/ -v --tb=short 2>&1
        echo "=== [document-reader] All tests PASSED ==="

  # ---------------------------------------------------------------------------
  # frontend — Node.js (vitest)
  # ---------------------------------------------------------------------------
  - name: 'node:22-alpine'
    id: 'test-frontend'
    waitFor: ['-']
    dir: 'apps/frontend'
    entrypoint: sh
    args:
      - '-c'
      - |
        set -e
        echo "=== [frontend] Installing dependencies ==="
        npm ci --prefer-offline
        echo "=== [frontend] Running tests ==="
        npm test 2>&1
        echo "=== [frontend] All tests PASSED ==="

  # ---------------------------------------------------------------------------
  # gateway-api — Node.js
  # ---------------------------------------------------------------------------
  - name: 'node:22-alpine'
    id: 'test-gateway-api'
    waitFor: ['-']
    dir: 'apps/gateway-api'
    entrypoint: sh
    args:
      - '-c'
      - |
        set -e
        echo "=== [gateway-api] Installing dependencies ==="
        npm ci --prefer-offline
        echo "=== [gateway-api] Running tests ==="
        NODE_OPTIONS='--experimental-vm-modules' npx jest --runInBand --forceExit --verbose 2>&1
        echo "=== [gateway-api] All tests PASSED ==="

  # ---------------------------------------------------------------------------
  # users-api — Node.js
  # ---------------------------------------------------------------------------
  - name: 'node:22-alpine'
    id: 'test-users-api'
    waitFor: ['-']
    dir: 'apps/users-api'
    entrypoint: sh
    args:
      - '-c'
      - |
        set -e
        echo "=== [users-api] Installing dependencies ==="
        npm ci --prefer-offline
        echo "=== [users-api] Running tests ==="
        NODE_OPTIONS='--experimental-vm-modules' npx jest --runInBand --forceExit --verbose 2>&1
        echo "=== [users-api] All tests PASSED ==="

  # ---------------------------------------------------------------------------
  # ingestor-api — Python
  # ---------------------------------------------------------------------------
  - name: 'python:3.11-slim'
    id: 'test-ingestor-api'
    waitFor: ['-']
    dir: 'apps/ingestor-api'
    entrypoint: sh
    args:
      - '-c'
      - |
        set -e
        echo "=== [ingestor-api] Installing test dependencies ==="
        pip install -q -r requirements/requirements-dev.txt
        echo "=== [ingestor-api] Running tests ==="
        python -m pytest tests/ -v --tb=short 2>&1
        echo "=== [ingestor-api] All tests PASSED ==="

  # ---------------------------------------------------------------------------
  # ai-worker — Python
  # ---------------------------------------------------------------------------
  - name: 'python:3.11-slim'
    id: 'test-ai-worker'
    waitFor: ['-']
    dir: 'apps/ai-worker'
    entrypoint: sh
    args:
      - '-c'
      - |
        set -e
        echo "=== [ai-worker] Installing test dependencies ==="
        pip install -q -r requirements/requirements-dev.txt
        echo "=== [ai-worker] Running tests ==="
        python -m pytest tests/ -v --tb=short 2>&1
        echo "=== [ai-worker] All tests PASSED ==="

  # ---------------------------------------------------------------------------
  # search-base — Python
  # ---------------------------------------------------------------------------
  - name: 'python:3.11-slim'
    id: 'test-search-base'
    waitFor: ['-']
    dir: 'apps/search-base'
    entrypoint: sh
    args:
      - '-c'
      - |
        set -e
        echo "=== [search-base] Installing test dependencies ==="
        pip install -q -r requirements/requirements-dev.txt
        echo "=== [search-base] Running tests ==="
        python -m pytest tests/ -v --tb=short 2>&1
        echo "=== [search-base] All tests PASSED ==="

  # ---------------------------------------------------------------------------
  # file-generator — Python
  # ---------------------------------------------------------------------------
  - name: 'python:3.11-slim'
    id: 'test-file-generator'
    waitFor: ['-']
    dir: 'apps/file-generator'
    entrypoint: sh
    args:
      - '-c'
      - |
        set -e
        echo "=== [file-generator] Installing test dependencies ==="
        pip install -q -r requirements/requirements-dev.txt
        echo "=== [file-generator] Running tests ==="
        python -m pytest tests/ -v --tb=short 2>&1
        echo "=== [file-generator] All tests PASSED ==="

  # ---------------------------------------------------------------------------
  # dlq-notifier — Python
  # ---------------------------------------------------------------------------
  - name: 'python:3.11-slim'
    id: 'test-dlq-notifier'
    waitFor: ['-']
    dir: 'apps/dlq-notifier'
    entrypoint: sh
    args:
      - '-c'
      - |
        set -e
        echo "=== [dlq-notifier] Installing test dependencies ==="
        pip install -q -r requirements/requirements-dev.txt
        echo "=== [dlq-notifier] Running tests ==="
        python -m pytest tests/ -v --tb=short 2>&1
        echo "=== [dlq-notifier] All tests PASSED ==="

  # ===========================================================================
  # PHASE 2 — GATE
  # Waits for every test step. If any earlier step failed this step is never
  # reached and the build is already marked FAILED by Cloud Build.
  # ===========================================================================

  - name: 'alpine'
    id: 'tests-gate'
    waitFor:
      - 'test-document-reader'
      - 'test-frontend'
      - 'test-gateway-api'
      - 'test-users-api'
      - 'test-ingestor-api'
      - 'test-ai-worker'
      - 'test-search-base'
      - 'test-file-generator'
      - 'test-dlq-notifier'
    entrypoint: sh
    args:
      - '-c'
      - |
        echo "All tests passed (commit $_SHORT_SHA). Proceeding with build and deployment."

  # ===========================================================================
  # PHASE 3 — BUILD & PUSH
  # Images are built and pushed to the container registry in parallel.
  # Each step waits for the gate (tests-gate) to ensure all tests passed first.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # document-reader  — build context: repo root
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-push-document-reader'
    waitFor: ['tests-gate']
    entrypoint: sh
    args:
      - '-c'
      - |
        set -e
        IMAGE="$_IMAGE_REGISTRY/$_PROJECT_ID/document-reader"
        echo "=== [document-reader] Building image $${IMAGE}:$_SHORT_SHA ==="
        docker build \
          -t "$${IMAGE}:$_COMMIT_SHA" \
          -t "$${IMAGE}:latest" \
          -f apps/document-reader/Dockerfile \
          .
        echo "=== [document-reader] Pushing image ==="
        docker push "$${IMAGE}:$_COMMIT_SHA"
        docker push "$${IMAGE}:latest"
        echo "=== [document-reader] Image pushed ==="

  # ---------------------------------------------------------------------------
  # frontend  — static npm build (Firebase Hosting; no Docker image needed)
  # ---------------------------------------------------------------------------
  - name: 'node:22-alpine'
    id: 'build-frontend'
    waitFor: ['tests-gate']
    dir: 'apps/frontend'
    entrypoint: sh
    secretEnv:
      - 'VITE_FIREBASE_API_KEY'
    args:
      - '-c'
      - |
        set -e
        echo "=== [frontend] Installing dependencies ==="
        export VITE_GATEWAY_URL="https://gateway-api-xxxx-uc.a.run.app"
        export VITE_FIREBASE_AUTH_DOMAIN="$_PROJECT_ID.firebaseapp.com"
        export FIREBASE_PROJECT_ID="$_PROJECT_ID"
        export VITE_FEATURE_DOCUMENT_READ="true"
        export VITE_FEATURE_USER_MANAGEMENT="true"
        npm ci && npm run build
        echo "=== [frontend] Static build complete ==="

  # ---------------------------------------------------------------------------
  # gateway-api  — build context: apps/gateway-api (no shared/ deps in image)
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-push-gateway-api'
    waitFor: ['tests-gate']
    entrypoint: sh
    args:
      - '-c'
      - |
        set -e
        IMAGE="$_IMAGE_REGISTRY/$_PROJECT_ID/gateway-api"
        echo "=== [gateway-api] Building image $${IMAGE}:$_SHORT_SHA ==="
        docker build \
          -t "$${IMAGE}:$_COMMIT_SHA" \
          -t "$${IMAGE}:latest" \
          -f apps/gateway-api/Dockerfile \
          apps/gateway-api
        echo "=== [gateway-api] Pushing image ==="
        docker push "$${IMAGE}:$_COMMIT_SHA"
        docker push "$${IMAGE}:latest"
        echo "=== [gateway-api] Image pushed ==="

  # ---------------------------------------------------------------------------
  # users-api  — build context: repo root (Dockerfile references shared/ libs)
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-push-users-api'
    waitFor: ['tests-gate']
    entrypoint: sh
    args:
      - '-c'
      - |
        set -e
        IMAGE="$_IMAGE_REGISTRY/$_PROJECT_ID/users-api"
        echo "=== [users-api] Building image $${IMAGE}:$_SHORT_SHA ==="
        docker build \
          -t "$${IMAGE}:$_COMMIT_SHA" \
          -t "$${IMAGE}:latest" \
          -f apps/users-api/Dockerfile \
          .
        echo "=== [users-api] Pushing image ==="
        docker push "$${IMAGE}:$_COMMIT_SHA"
        docker push "$${IMAGE}:latest"
        echo "=== [users-api] Image pushed ==="

  # ---------------------------------------------------------------------------
  # ingestor-api  — build context: repo root (Dockerfile references shared/ libs)
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-push-ingestor-api'
    waitFor: ['tests-gate']
    entrypoint: sh
    args:
      - '-c'
      - |
        set -e
        IMAGE="$_IMAGE_REGISTRY/$_PROJECT_ID/ingestor-api"
        echo "=== [ingestor-api] Building image $${IMAGE}:$_SHORT_SHA ==="
        docker build \
          -t "$${IMAGE}:$_COMMIT_SHA" \
          -t "$${IMAGE}:latest" \
          -f apps/ingestor-api/Dockerfile \
          .
        echo "=== [ingestor-api] Pushing image ==="
        docker push "$${IMAGE}:$_COMMIT_SHA"
        docker push "$${IMAGE}:latest"
        echo "=== [ingestor-api] Image pushed ==="

  # ---------------------------------------------------------------------------
  # ai-worker  — build context: repo root (Dockerfile references shared/ libs)
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-push-ai-worker'
    waitFor: ['tests-gate']
    entrypoint: sh
    args:
      - '-c'
      - |
        set -e
        IMAGE="$_IMAGE_REGISTRY/$_PROJECT_ID/ai-worker"
        echo "=== [ai-worker] Building image $${IMAGE}:$_SHORT_SHA ==="
        docker build \
          -t "$${IMAGE}:$_COMMIT_SHA" \
          -t "$${IMAGE}:latest" \
          -f apps/ai-worker/Dockerfile \
          .
        echo "=== [ai-worker] Pushing image ==="
        docker push "$${IMAGE}:$_COMMIT_SHA"
        docker push "$${IMAGE}:latest"
        echo "=== [ai-worker] Image pushed ==="

  # ---------------------------------------------------------------------------
  # search-base  — build context: repo root (Dockerfile references shared/ libs)
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-push-search-base'
    waitFor: ['tests-gate']
    entrypoint: sh
    args:
      - '-c'
      - |
        set -e
        IMAGE="$_IMAGE_REGISTRY/$_PROJECT_ID/search-base"
        echo "=== [search-base] Building image $${IMAGE}:$_SHORT_SHA ==="
        docker build \
          -t "$${IMAGE}:$_COMMIT_SHA" \
          -t "$${IMAGE}:latest" \
          -f apps/search-base/Dockerfile \
          .
        echo "=== [search-base] Pushing image ==="
        docker push "$${IMAGE}:$_COMMIT_SHA"
        docker push "$${IMAGE}:latest"
        echo "=== [search-base] Image pushed ==="

  # ---------------------------------------------------------------------------
  # file-generator  — build context: repo root (Dockerfile references shared/ libs)
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-push-file-generator'
    waitFor: ['tests-gate']
    entrypoint: sh
    args:
      - '-c'
      - |
        set -e
        IMAGE="$_IMAGE_REGISTRY/$_PROJECT_ID/file-generator"
        echo "=== [file-generator] Building image $${IMAGE}:$_SHORT_SHA ==="
        docker build \
          -t "$${IMAGE}:$_COMMIT_SHA" \
          -t "$${IMAGE}:latest" \
          -f apps/file-generator/Dockerfile \
          .
        echo "=== [file-generator] Pushing image ==="
        docker push "$${IMAGE}:$_COMMIT_SHA"
        docker push "$${IMAGE}:latest"
        echo "=== [file-generator] Image pushed ==="

  # ---------------------------------------------------------------------------
  # dlq-notifier  — build context: repo root (Dockerfile references shared/ libs)
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-push-dlq-notifier'
    waitFor: ['tests-gate']
    entrypoint: sh
    args:
      - '-c'
      - |
        set -e
        IMAGE="$_IMAGE_REGISTRY/$_PROJECT_ID/dlq-notifier"
        echo "=== [dlq-notifier] Building image $${IMAGE}:$_SHORT_SHA ==="
        docker build \
          -t "$${IMAGE}:$_COMMIT_SHA" \
          -t "$${IMAGE}:latest" \
          -f apps/dlq-notifier/Dockerfile \
          .
        echo "=== [dlq-notifier] Pushing image ==="
        docker push "$${IMAGE}:$_COMMIT_SHA"
        docker push "$${IMAGE}:latest"
        echo "=== [dlq-notifier] Image pushed ==="

  # ===========================================================================
  # PHASE 4 — DEPLOY
  # Each service is deployed to Cloud Run after its own image has been pushed.
  # Deploy steps run in parallel across services (each waits for its own push).
  #
  # Access control
  # ──────────────
  # - gateway-api is the only publicly accessible Cloud Run service
  #   (--allow-unauthenticated).  Every other service uses
  #   --no-allow-unauthenticated so it is reachable only by callers that
  #   present a valid Google-signed OIDC token.
  # - Each service runs under its own dedicated service account
  #   (svc-<service>@PROJECT.iam.gserviceaccount.com) following the
  #   least-privilege principle.  See documentation/deployment plan.md §B2
  #   for the full IAM setup instructions.
  #
  # Adjust Cloud Run flags (--memory, --cpu, --min-instances, --max-instances,
  # --concurrency, --set-env-vars, etc.) as required per service before going
  # to production.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # document-reader
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-document-reader'
    waitFor: ['build-push-document-reader']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'document-reader'
      - '--image=$_IMAGE_REGISTRY/$_PROJECT_ID/document-reader:$_COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--port=8004'
      - '--no-allow-unauthenticated'
      - '--service-account=svc-document-reader@$_PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars=GCP_PROJECT_ID=$_PROJECT_ID,LOG_LEVEL=INFO,MAX_FILE_SIZE_MB=10'
      - '--quiet'

  # ---------------------------------------------------------------------------
  # frontend — Firebase Hosting deploy
  # ---------------------------------------------------------------------------
  - name: 'node:22-alpine'
    id: 'deploy-frontend'
    waitFor: ['build-frontend']
    dir: '.'
    entrypoint: sh
    secretEnv:
      - 'FIREBASE_DEPLOY_TOKEN'
    args:
      - '-c'
      - |
        set -e
        echo "=== [frontend] Installing Firebase CLI ==="
        npm install -g firebase-tools
        echo "=== [frontend] Deploying to Firebase Hosting ==="
        firebase deploy --only hosting --project $_PROJECT_ID --non-interactive \
          --token "$$FIREBASE_DEPLOY_TOKEN"
        echo "=== [frontend] Firebase Hosting deploy complete ==="

  # ---------------------------------------------------------------------------
  # gateway-api — the only publicly reachable Cloud Run service
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-gateway-api'
    waitFor: ['build-push-gateway-api']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gateway-api'
      - '--image=$_IMAGE_REGISTRY/$_PROJECT_ID/gateway-api:$_COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--port=3000'
      - '--allow-unauthenticated'
      - '--service-account=svc-gateway@$_PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars=NODE_ENV=production,FIREBASE_PROJECT_ID=$_PROJECT_ID,GCP_PROJECT_ID=$_PROJECT_ID,DOCUMENT_READER_SERVICE_URL=https://document-reader-xxxx-uc.a.run.app,USER_API_SERVICE_URL=https://users-api-xxxx-uc.a.run.app,INGESTOR_SERVICE_URL=https://ingestor-api-xxxx-uc.a.run.app,SEARCH_BASE_SERVICE_URL=https://search-base-xxxx-uc.a.run.app,FILE_GENERATOR_SERVICE_URL=https://file-generator-xxxx-uc.a.run.app,DLQ_NOTIFIER_SERVICE_URL=https://dlq-notifier-xxxx-uc.a.run.app,ALLOWED_ORIGINS=https://$_PROJECT_ID.web.app'
      - '--quiet'

  # ---------------------------------------------------------------------------
  # users-api
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-users-api'
    waitFor: ['build-push-users-api']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'users-api'
      - '--image=$_IMAGE_REGISTRY/$_PROJECT_ID/users-api:$_COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--port=8005'
      - '--no-allow-unauthenticated'
      - '--service-account=svc-users-api@$_PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars=NODE_ENV=production,FIREBASE_PROJECT_ID=$_PROJECT_ID,GCP_PROJECT_ID=$_PROJECT_ID'
      - '--update-secrets=BOOTSTRAP_ADMIN_USER_EMAIL=BOOTSTRAP_ADMIN_USER_EMAIL:latest,ONBOARDABLE_EMAIL_DOMAINS=ONBOARDABLE_EMAIL_DOMAINS:latest'
      - '--quiet'

  # ---------------------------------------------------------------------------
  # ingestor-api
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-ingestor-api'
    waitFor: ['build-push-ingestor-api']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ingestor-api'
      - '--image=$_IMAGE_REGISTRY/$_PROJECT_ID/ingestor-api:$_COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--port=8001'
      - '--no-allow-unauthenticated'
      - '--service-account=svc-ingestor-api@$_PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars=GCP_PROJECT_ID=$_PROJECT_ID,LOG_LEVEL=INFO'
      - '--quiet'

  # ---------------------------------------------------------------------------
  # ai-worker — invoked exclusively by Pub/Sub push subscriptions
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-ai-worker'
    waitFor: ['build-push-ai-worker']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ai-worker'
      - '--image=$_IMAGE_REGISTRY/$_PROJECT_ID/ai-worker:$_COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--port=8006'
      - '--no-allow-unauthenticated'
      - '--service-account=svc-ai-worker@$_PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars=GCP_PROJECT_ID=$_PROJECT_ID,LOG_LEVEL=INFO,VERTEX_AI_LOCATION=$_REGION'
      - '--quiet'

  # ---------------------------------------------------------------------------
  # search-base — invoked by gateway (search) and Pub/Sub push (resume-indexed)
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-search-base'
    waitFor: ['build-push-search-base']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'search-base'
      - '--image=$_IMAGE_REGISTRY/$_PROJECT_ID/search-base:$_COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--port=8002'
      - '--no-allow-unauthenticated'
      - '--min-instances=1'
      - '--service-account=svc-search-base@$_PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars=GCP_PROJECT_ID=$_PROJECT_ID,LOG_LEVEL=INFO,VERTEX_AI_LOCATION=$_REGION'
      - '--quiet'

  # ---------------------------------------------------------------------------
  # file-generator
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-file-generator'
    waitFor: ['build-push-file-generator']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'file-generator'
      - '--image=$_IMAGE_REGISTRY/$_PROJECT_ID/file-generator:$_COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--port=8003'
      - '--no-allow-unauthenticated'
      - '--service-account=svc-file-generator@$_PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars=GCP_PROJECT_ID=$_PROJECT_ID,LOG_LEVEL=INFO'
      - '--quiet'

  # ---------------------------------------------------------------------------
  # dlq-notifier — invoked by gateway (notifications API) and Pub/Sub push
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-dlq-notifier'
    waitFor: ['build-push-dlq-notifier']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'dlq-notifier'
      - '--image=$_IMAGE_REGISTRY/$_PROJECT_ID/dlq-notifier:$_COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--port=8007'
      - '--no-allow-unauthenticated'
      - '--service-account=svc-dlq-notifier@$_PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars=GCP_PROJECT_ID=$_PROJECT_ID,LOG_LEVEL=INFO'
      - '--update-secrets=SMTP_HOST=SMTP_HOST:latest,SMTP_PORT=SMTP_PORT:latest,SMTP_USER=SMTP_USER:latest,SMTP_PASSWORD=SMTP_PASSWORD:latest,SMTP_FROM=SMTP_FROM:latest,NOTIFICATION_RECIPIENTS=NOTIFICATION_RECIPIENTS:latest'
      - '--quiet'

availableSecrets:
  secretManager:
    - versionName: projects/$_PROJECT_ID/secrets/VITE_FIREBASE_API_KEY/versions/latest
      env: 'VITE_FIREBASE_API_KEY'
    - versionName: projects/$_PROJECT_ID/secrets/FIREBASE_DEPLOY_TOKEN/versions/latest
      env: 'FIREBASE_DEPLOY_TOKEN'
