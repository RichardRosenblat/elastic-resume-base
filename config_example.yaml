# =============================================================================
# Elastic Resume Base – Configuration Template
# =============================================================================
#
# SETUP INSTRUCTIONS:
#   1. Copy this file to config.yaml (git-ignored):
#        cp config_example.yaml config.yaml
#   2. Edit config.yaml and fill in any sensitive values
#      (GOOGLE_SERVICE_ACCOUNT_KEY, DLQ_SLACK_WEBHOOK_URL, etc.).
#   3. Start all services — each API reads config.yaml directly at startup:
#        docker compose up
#
# config.yaml is git-ignored — never commit real credentials.
# config_example.yaml is the committed template with safe defaults.
#
# =============================================================================
# Structure:
#   systems.shared          — variables inherited by every service
#   systems.<service-name>  — service-specific variables (override shared)
#
# Each Node.js service reads this file at startup (via src/utils/loadConfigYaml.ts),
# merging systems.shared with its own section into process.env.
# Keys already present in process.env are never overridden.
# =============================================================================

systems:

  # ---------------------------------------------------------------------------
  # Shared — merged into every service's .env file.
  # Service-specific values override these when the same key appears in both.
  # ---------------------------------------------------------------------------
  shared:
    NODE_ENV: development
    LOG_LEVEL: info

    # Google Cloud / Firebase project identifiers
    GCP_PROJECT_ID: demo-elastic-resume-base
    FIREBASE_PROJECT_ID: demo-elastic-resume-base
    # Auth domain for the Firebase project (e.g. <project-id>.firebaseapp.com).
    # Vite derives VITE_FIREBASE_AUTH_DOMAIN from this automatically.
    FIREBASE_AUTH_DOMAIN: ""        # e.g. demo-elastic-resume-base.firebaseapp.com

    # Google Cloud service-account key file for local development.
    # Set this to the absolute path of a JSON key file whose service account
    # has the permissions required by every GCP-backed service (Vision API,
    # Firestore, Pub/Sub, Vertex AI, …).
    # Leave empty in production — GCP-hosted environments (Cloud Run, GKE, …)
    # provide Application Default Credentials automatically.
    GOOGLE_APPLICATION_CREDENTIALS: ""   # e.g. /home/user/keys/my-sa-key.json

    # Firebase Local Emulator Suite — point at the docker-compose service name.
    # For local dev without Docker, change these to localhost:<port>.
    FIRESTORE_EMULATOR_HOST: "firebase-emulator:8080"
    FIREBASE_AUTH_EMULATOR_HOST: "firebase-emulator:9099"
    PUBSUB_EMULATOR_HOST: "firebase-emulator:8085"

  # ---------------------------------------------------------------------------
  # Gateway API (Node.js — port 3000)
  # ---------------------------------------------------------------------------
  gateway-api:
    PORT: "3000"

    # Global request rate-limiting for Gateway API.
    RATE_LIMIT_MAX: "1000"
    RATE_LIMIT_TIME_WINDOW: "15 minutes"

    # Additional rate-limiting for protected /api/v1 routes.
    API_V1_RATE_LIMIT_MAX: "1000"
    API_V1_RATE_LIMIT_TIME_WINDOW: "15 minutes"

    # Comma-separated list of allowed CORS origins
    ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"

    # Timeout (milliseconds) applied to every downstream service call
    REQUEST_TIMEOUT_MS: "30000"

    # Service registry — downstream health tracking
    # A downstream service is considered "warm" if it was seen alive within this window (ms).
    DOWNSTREAM_WARM_TTL_MS: "300000"
    # How often (ms) the gateway re-probes services that have gone cold.
    DOWNSTREAM_HEALTH_REFRESH_INTERVAL_MS: "3600000"

    # Downstream microservice base URLs (Docker Compose service names)
    INGESTOR_SERVICE_URL: "http://ingestor-service:8001"
    SEARCH_BASE_SERVICE_URL: "http://search-base:8002"
    FILE_GENERATOR_SERVICE_URL: "http://file-generator:8003"
    DOCUMENT_READER_SERVICE_URL: "http://document-reader:8004"
    USER_API_SERVICE_URL: "http://users-api:8005"
    DLQ_NOTIFIER_SERVICE_URL: "http://dlq-notifier:8007"

  # ---------------------------------------------------------------------------
  # Users API (Node.js — port 8005)
  # ---------------------------------------------------------------------------
  users-api:
    PORT: "8005"

    # Global request rate-limiting for Users API.
    # Increase RATE_LIMIT_MAX if admins perform many user-management actions.
    RATE_LIMIT_MAX: "500"
    RATE_LIMIT_TIME_WINDOW: "15 minutes"

    # Name of the Firestore collection where user documents are stored.
    FIRESTORE_USERS_COLLECTION: users

    # Name of the Firestore collection where pre-approved user documents are stored.
    FIRESTORE_PRE_APPROVED_USERS_COLLECTION: pre_approved_users

    # Email address of the initial admin user.
    # On startup, the Users API will add this email to the pre-approved users collection
    # with the 'admin' role, unless it already exists in either collection.
    BOOTSTRAP_ADMIN_USER_EMAIL: ""

    # Comma-separated list of domains and/or explicit email addresses whose users are
    # automatically created with role=admin and enable=true on first login.
    # Supports domain patterns ("example.com", "@example.com") and full addresses ("user@example.com").
    # Set to an empty string to disable admin auto-creation entirely.
    # Leave unset to use default (no auto-admin creation).
    AUTO_ADMIN_CREATION_DOMAINS: ""

    # Comma-separated list of domains and/or explicit email addresses whose users are
    # automatically created with role=user and enable=false on first login.
    # Supports domain patterns ("example.com", "@example.com") and full addresses ("user@example.com").
    # Users created this way must be approved by an admin before they can access the application.
    # Set to an empty string to disable user auto-creation entirely.
    # When not set, falls back to ONBOARDABLE_EMAIL_DOMAINS (deprecated).
    AUTO_USER_CREATION_DOMAINS: ""

    # Deprecated — use AUTO_USER_CREATION_DOMAINS instead.
    # Comma-separated list of email domains that are automatically onboarded.
    # Users from these domains are registered with enable=false and must be approved by an admin.
    # Ignored when AUTO_USER_CREATION_DOMAINS is set.
    # Leave empty to disable automatic onboarding (only pre-approved users gain access).
    ONBOARDABLE_EMAIL_DOMAINS: ""

  # ---------------------------------------------------------------------------
  # Frontend (React — port 5173 dev / 80 Docker)
  # Build-time VITE_ variables injected as Docker ARGs during `docker compose build`.
  #
  # For LOCAL DEVELOPMENT: these values are read directly from this file by
  # the Vite dev server
  #
  # SEPARATION OF CONCERNS:
  #   - Operational / infrastructure config → this file (systems.frontend)
  #   - Appearance (colours, fonts, branding, dark-mode) → frontend/src/theme/theme.json
  # ---------------------------------------------------------------------------
  frontend:
    # Base URL for the Gateway API
    VITE_GATEWAY_URL: "http://localhost:3000"

    # Support contact email shown in the footer of every page.
    # Leave empty ("") to hide the support footer entirely.
    VITE_SUPPORT_EMAIL: ""

    # Firebase Web SDK configuration (must match the Firebase project)
    # VITE_FIREBASE_PROJECT_ID  → derived automatically from systems.shared.FIREBASE_PROJECT_ID
    # VITE_FIREBASE_AUTH_DOMAIN → derived automatically from systems.shared.FIREBASE_AUTH_DOMAIN
    VITE_FIREBASE_API_KEY: ""           # fill in locally

    # Maximum number of files a user may add to a single upload batch.
    # The frontend enforces this limit when merging new file selections.
    VITE_DOCUMENT_MAX_FILES: "20"

    # Feature flags — set to "true" to enable, "false" to hide/disable
    VITE_FEATURE_RESUME_INGEST: "false"    # Resume ingestion (AI worker not ready)
    VITE_FEATURE_RESUME_SEARCH: "true"     # Semantic search (search-base ready)
    VITE_FEATURE_DOCUMENT_READ: "true"    # Document reader (OCR service ready)
    VITE_FEATURE_RESUME_GENERATE: "false"  # Resume generation (file-generator not ready)
    VITE_FEATURE_USER_MANAGEMENT: "true"   # Admin user management (users-api ready)
    VITE_FEATURE_DLQ_NOTIFIER: "true"     # DLQ Notifier notification panel (bell icon + smart polling)

    # When set to "true", features that are disabled (flag = "false") are hidden
    # entirely from the sidebar and dashboard instead of being shown as "Coming Soon".
    VITE_FEATURE_HIDE_IF_DISABLED: "false"

    # Smart notification polling intervals (milliseconds).
    # The frontend uses these to adapt polling frequency based on user activity.
    VITE_NOTIFICATIONS_ACTIVE_INTERVAL_MS: "30000"   # 30 s when user is active
    VITE_NOTIFICATIONS_IDLE_INTERVAL_MS: "120000"    # 120 s when user is idle
    VITE_NOTIFICATIONS_IDLE_THRESHOLD_MS: "300000"   # 5 min before considered idle

  # ---------------------------------------------------------------------------
  # Ingestor Service (Python — port 8001)
  # Downloads resumes from Google Sheets/Drive and publishes to Pub/Sub.
  # ---------------------------------------------------------------------------
  ingestor-service:
    PORT: "8001"

    # Name of the Firestore collection where ingested resume raw data is stored.
    FIRESTORE_COLLECTION_RESUMES: resumes

    # Pub/Sub topic names
    PUBSUB_TOPIC_RESUME_INGESTED: resume-ingested
    PUBSUB_TOPIC_DLQ: dead-letter-queue

    # Name of the default column in the Google Sheet containing the resume links.
    SHEETS_LINK_COLUMN: resume_link

    # Timeout (seconds) applied to every HTTP request made by the ingestor service
    HTTP_REQUEST_TIMEOUT: 120
    # Maximum number of API requests accepted from a single client IP per minute.
    RATE_LIMIT_PER_MINUTE: 60
    # Maximum number of resumes processed concurrently during a single ingest batch.
    INGEST_CONCURRENCY: 10

  # ---------------------------------------------------------------------------
  # AI Worker (Python — Pub/Sub triggered)
  # Extracts structured data and generates embeddings using Vertex AI.
  # ---------------------------------------------------------------------------
  ai-worker:
    PORT: "8006"
    VERTEX_AI_LOCATION: us-central1
    VERTEX_AI_EXTRACTION_MODEL: gemini-1.5-flash
    VERTEX_AI_EMBEDDING_MODEL: text-multilingual-embedding-002
    PUBSUB_TOPIC_RESUME_INGESTED: resume-ingested
    PUBSUB_TOPIC_RESUME_INDEXED: resume-indexed
    PUBSUB_TOPIC_DLQ: dead-letter-queue
    FIRESTORE_COLLECTION_RESUMES: resumes
    FIRESTORE_COLLECTION_EMBEDDINGS: embeddings

    # Cloud KMS — PII encryption key name
    # Fully-qualified Cloud KMS key name used to encrypt PII fields (name, email, phone, etc.)
    # before persisting to Firestore. When empty, PII fields are stored as plain text
    # (suitable for local development only).
    # Format: projects/<project>/locations/<location>/keyRings/<keyring>/cryptoKeys/<key>
    ENCRYPT_KMS_KEY_NAME: ""

    # Maximum seconds a single HTTP request to this service may take before timeout.
    # Health endpoints are excluded from this limit.
    HTTP_REQUEST_TIMEOUT: 300

  # ---------------------------------------------------------------------------
  # Search Base (Python + FAISS — port 8002)
  # Manages the FAISS vector index and handles semantic search queries.
  # ---------------------------------------------------------------------------
  search-base:
    PORT: "8002"
    VERTEX_AI_LOCATION: us-central1
    VERTEX_AI_EMBEDDING_MODEL: text-multilingual-embedding-002
    FIRESTORE_COLLECTION_RESUMES: resumes
    FIRESTORE_COLLECTION_EMBEDDINGS: embeddings
    PUBSUB_TOPIC_RESUME_INDEXED: resume-indexed
    PUBSUB_TOPIC_DLQ: dead-letter-queue

    # Optional path for persisting the FAISS index to disk.
    # When empty (default), the index exists in-memory only and is rebuilt on restart.
    # When set, the index is saved to disk and reloaded on startup if present.
    FAISS_INDEX_PATH: ""   # e.g. /app/data/faiss_index

    # Distance metric for FAISS index: "cosine" or "l2"
    FAISS_INDEX_METRIC: cosine

    # Cloud KMS — PII decryption key name
    # Fully-qualified Cloud KMS key name used to decrypt PII fields before
    # returning search results. When empty, decryption is skipped (local dev).
    # Format: projects/<project>/locations/<location>/keyRings/<keyring>/cryptoKeys/<key>
    DECRYPT_KMS_KEY_NAME: ""

    # Maximum seconds a single HTTP request to this service may take before timeout.
    # Health endpoints are excluded from this limit.
    HTTP_REQUEST_TIMEOUT: 300

  # ---------------------------------------------------------------------------
  # File Generator (Python — port 8003)
  # Generates resume documents and handles translation.
  # ---------------------------------------------------------------------------
  file-generator:
    PORT: "8003"
    FIRESTORE_COLLECTION_RESUMES: resumes
    FIRESTORE_COLLECTION_TRANSLATION_CACHE: translation-cache

    # Google Drive file ID for the .docx Jinja2 resume template.
    # Required in production; may be left empty for local development when
    # a local template path is provided instead.
    DRIVE_TEMPLATE_FILE_ID: ""

    # Path to a local .docx template file used in development when
    # DRIVE_TEMPLATE_FILE_ID is not set.
    LOCAL_TEMPLATE_PATH: ""

    # Cloud KMS — PII decryption key name
    # Fully-qualified Cloud KMS key name used to decrypt PII fields before
    # generating documents. When empty, decryption is skipped and field values
    # are returned as-is (for local development).
    # Format: projects/<project>/locations/<location>/keyRings/<keyring>/cryptoKeys/<key>
    DECRYPT_KMS_KEY_NAME: ""

    # Google Cloud region for the Translation API.
    TRANSLATION_API_LOCATION: global

    # Maximum seconds a single HTTP request to this service may take before timeout.
    # Health endpoints are excluded from this limit.
    HTTP_REQUEST_TIMEOUT: 300

  # ---------------------------------------------------------------------------
  # Document Reader / OCR (Python — port 8004)
  # Extracts text from scanned documents (images, PDFs, DOCX) using Google
  # Cloud Vision API and returns structured data as an Excel workbook.
  # ---------------------------------------------------------------------------
  document-reader:
    PORT: "8004"

    # GCP project used for Cloud Vision API calls.
    # Inherited from systems.shared.GCP_PROJECT_ID — override here only if
    # the document-reader must target a different project than the rest of
    # the platform.
    # GCP_PROJECT_ID: ""

    # Maximum accepted file size for a single uploaded document (in MB).
    # Files larger than this value are rejected with HTTP 422.
    MAX_FILE_SIZE_MB: "10"

    # Maximum number of API requests accepted from a single client IP per
    # minute.  Exceeding this limit returns HTTP 429 with a message asking
    # the user to try again later.  Increase for trusted high-volume clients.
    RATE_LIMIT_PER_MINUTE: "60"

    # Maximum number of Google Cloud Vision API calls allowed per minute
    # across all incoming requests.  This guards against runaway usage of the
    # Vision API quota.  Exceeding this returns HTTP 429 with a message
    # directing users to contact support.  Adjust to match your GCP quota.
    VISION_API_RATE_LIMIT: "60"

    # Vision API request timeout in seconds.
    VISION_API_TIMEOUT: "30"

    # Maximum number of retries for a single Vision API call before giving up.
    VISION_API_MAX_RETRIES: "3"

    # Delay in seconds between Vision API retry attempts.
    VISION_API_RETRY_DELAY: "1.0"

    # Maximum dimension (width or height, in pixels) to which document images
    # are resized before being sent to the Vision API.  Larger images are
    # downscaled; smaller images are left unchanged.
    VISION_API_IMAGE_MAX_DIMENSION: "3000"

    # DPI used when rendering PDF pages to images for Vision API processing.
    VISION_API_PDF_DPI: "200"

    # Maximum seconds a single HTTP request to this service may take.
    # Health endpoints are excluded from this limit.
    HTTP_REQUEST_TIMEOUT: "60"

    # Logging verbosity (debug | info | warning | error | critical).
    # Inherited from systems.shared.LOG_LEVEL — override here for more
    # verbose OCR debugging without flooding the rest of the platform.
    # LOG_LEVEL: "debug"

  # ---------------------------------------------------------------------------
  # DLQ Notifier (Python — port 8007, Pub/Sub triggered)
  # Monitors the Dead Letter Queue and sends email failure alerts.
  # ---------------------------------------------------------------------------
  dlq-notifier:
    PORT: "8007"
    PUBSUB_TOPIC_DLQ: dead-letter-queue

    # Comma-separated list of email addresses that receive DLQ alert emails.
    # Leave empty to disable email notifications.
    NOTIFICATION_RECIPIENTS: ""   # e.g. ops@example.com,alerts@example.com

    # SMTP transport configuration for outgoing alert emails.
    # Leave SMTP_HOST empty to disable email delivery (alerts will be logged only).
    SMTP_HOST: ""          # e.g. smtp.gmail.com
    SMTP_PORT: "587"       # 587 = STARTTLS, 465 = SMTPS, 25 = plain
    SMTP_SECURE: "false"   # "true" to wrap the connection in TLS from the start
    SMTP_USER: ""          # SMTP auth username — omit for unauthenticated relays
    SMTP_PASSWORD: ""      # SMTP auth password — never commit real credentials
    SMTP_FROM: ""          # Sender address, e.g. noreply@example.com

    # GCP project ID used to initialise Firestore (defaults to firebase_project_id).
    GCP_PROJECT_ID: ""

    # Firestore collection where notification records are persisted.
    FIRESTORE_COLLECTION_NOTIFICATIONS: notifications

    # Number of days after which old notifications are automatically purged.
    NOTIFICATION_TTL_DAYS: "30"

    # Maximum seconds a single HTTP request to this service may take before timeout.
    # Health endpoints are excluded from this limit.
    HTTP_REQUEST_TIMEOUT: "300"
