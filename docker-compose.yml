# All environment variables are managed through config.yaml (git-ignored).
# Each service reads the file directly at startup, loading systems.shared
# merged with its own systems.<service-name> section.
#
# Before running docker-compose for the first time:
#   cp config_example.yaml config.yaml   # copy the template (first time only)
#   # edit config.yaml and fill in any sensitive values
#   docker compose up
#
# See documentation/docker-orchestration.md for full details.

services:
  # 1. Local Firebase/GCP Emulation Environment
  firebase-emulator:
    build:
      context: ./firebase-emulator
    ports:
      - "4000:4000"   # Emulator UI
      - "9099:9099"   # Firebase Authentication
      - "8080:8080"   # Firestore
      - "8085:8085"   # Cloud Pub/Sub
    volumes:
      - ./firebase-emulator/firebase.json:/srv/firebase/firebase.json

  # 2. Node.js Gateway API
  gateway-api:
    build:
      context: .
      dockerfile: apps/gateway-api/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro   # read by loadConfigYaml at startup
    depends_on:
      - firebase-emulator
      - users-api

  # 3. Users API Microservice
  users-api:
    build:
      context: .
      dockerfile: apps/users-api/Dockerfile
    ports:
      - "8005:8005"
    volumes:
      - ./config.yaml:/app/config.yaml:ro   # read by loadConfigYaml at startup
    depends_on:
      - firebase-emulator

  # 4. React Frontend (static bundle served by nginx)
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        - VITE_GATEWAY_URL=http://localhost:3000
    ports:
      - "5173:80"
    depends_on:
      - gateway-api

  # 5. Search Base (Python + FAISS — port 8002)
  search-base:
    build:
      context: .
      dockerfile: apps/search-base/Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./config.yaml:/app/config.yaml:ro   # read by load_config_yaml at startup
    depends_on:
      - firebase-emulator

  # 6. Document Reader / OCR (Python — port 8004)
  document-reader:
    build:
      context: .
      dockerfile: apps/document-reader/Dockerfile
    ports:
      - "8004:8004"
    volumes:
      - ./config.yaml:/app/config.yaml:ro   # read by load_config_yaml at startup
    depends_on:
      - firebase-emulator

  # 7. Ingestor API (Python — port 8001)
  ingestor-api:
    build:
      context: .
      dockerfile: apps/ingestor-api/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./config.yaml:/app/config.yaml:ro   # read by load_config_yaml at startup
    depends_on:
      - firebase-emulator

  # 8. AI Worker (Python — port 8006)
  ai-worker:
    build:
      context: .
      dockerfile: apps/ai-worker/Dockerfile
    ports:
      - "8006:8006"
    volumes:
      - ./config.yaml:/app/config.yaml:ro   # read by load_config_yaml at startup
    depends_on:
      - firebase-emulator

  # 9. File Generator (Python — port 8003)
  file-generator:
    build:
      context: .
      dockerfile: apps/file-generator/Dockerfile
    ports:
      - "8003:8003"
    volumes:
      - ./config.yaml:/app/config.yaml:ro   # read by load_config_yaml at startup
    depends_on:
      - firebase-emulator

  # 10. DLQ Notifier (Python — port 8007)
  dlq-notifier:
    build:
      context: .
      dockerfile: apps/dlq-notifier/Dockerfile
    ports:
      - "8007:8007"
    volumes:
      - ./config.yaml:/app/config.yaml:ro   # read by load_config_yaml at startup
    depends_on:
      - firebase-emulator

