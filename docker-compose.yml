# Docker Compose >= 2.24.0 is required for env_file format: yaml support.
# See: https://docs.docker.com/compose/compose-file/05-services/#env_file
#
# All environment variables are centralised in the root env.yaml file.
# Each service loads env.yaml via env_file and then overrides only the
# variables that differ between services (e.g. PORT).
#
# To add local secrets without committing them, create a
# docker-compose.override.yml at the repository root — it is git-ignored.

services:
  # 1. Local Firebase/GCP Emulation Environment
  firebase-emulator:
    build:
      context: ./firebase-emulator
    ports:
      - "4000:4000"   # Emulator UI
      - "9099:9099"   # Firebase Authentication
      - "8080:8080"   # Firestore
      - "8085:8085"   # Cloud Pub/Sub
    volumes:
      - ./firebase-emulator/firebase.json:/srv/firebase/firebase.json

  # 2. Node.js Backend-for-Frontend (BFF) Gateway
  bff-gateway:
    build:
      context: ./bff-gateway
    ports:
      - "3000:3000"
    env_file:
      - path: ./env.yaml
        format: yaml
    environment:
      # Override PORT explicitly so bff-gateway always listens on 3000,
      # regardless of any PORT value that might be inherited from env.yaml.
      PORT: "3000"
    depends_on:
      - firebase-emulator
      - users-api

  # 3. Users API Microservice
  users-api:
    build:
      context: .
      dockerfile: users-api/Dockerfile
    ports:
      - "8005:8005"
    env_file:
      - path: ./env.yaml
        format: yaml
    environment:
      # Override PORT explicitly so users-api always listens on 8005.
      PORT: "8005"
    depends_on:
      - firebase-emulator
