# All environment variables are managed through config.yaml (git-ignored).
# Before running docker-compose for the first time, generate per-service
# .env files from your config.yaml:
#
#   cp config_example.yaml config.yaml   # copy the template (first time only)
#   python3 scripts/setup-env.py         # generate <service>/.env files
#   docker compose up
#
# Re-run setup-env.py any time you change config.yaml.
# See documentation/docker-orchestration.md for full details.

services:
  # 1. Local Firebase/GCP Emulation Environment
  firebase-emulator:
    build:
      context: ./firebase-emulator
    ports:
      - "4000:4000"   # Emulator UI
      - "9099:9099"   # Firebase Authentication
      - "8080:8080"   # Firestore
      - "8085:8085"   # Cloud Pub/Sub
    volumes:
      - ./firebase-emulator/firebase.json:/srv/firebase/firebase.json

  # 2. Node.js Backend-for-Frontend (BFF) Gateway
  bff-gateway:
    build:
      context: ./bff-gateway
    ports:
      - "3000:3000"
    env_file:
      - ./bff-gateway/.env   # generated by scripts/setup-env.py
    depends_on:
      - firebase-emulator
      - users-api

  # 3. Users API Microservice
  users-api:
    build:
      context: .
      dockerfile: users-api/Dockerfile
    ports:
      - "8005:8005"
    env_file:
      - ./users-api/.env   # generated by scripts/setup-env.py
    depends_on:
      - firebase-emulator
